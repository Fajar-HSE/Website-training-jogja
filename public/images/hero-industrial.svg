<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1a2332" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="700" fill="url(#heroGrad)"/>
  
  <!-- Dark overlay -->
  <rect width="1200" height="700" fill="#0F172A" opacity="0.75"/>
  
  <!-- Decorative industrial elements -->
  <g opacity="0.1">
    <rect x="100" y="80" width="300" height="200" rx="12" stroke="#fff" stroke-width="2" fill="none"/>
    <rect x="450" y="150" width="250" height="180" rx="12" stroke="#16A34A" stroke-width="2" fill="none"/>
    <rect x="800" y="120" width="280" height="220" rx="12" stroke="#F59E0B" stroke-width="2" fill="none"/>
    
    <!-- Grid pattern -->
    <line x1="200" y1="0" x2="200" y2="700" stroke="#fff" stroke-width="1" opacity="0.05"/>
    <line x1="400" y1="0" x2="400" y2="700" stroke="#fff" stroke-width="1" opacity="0.05"/>
    <line x1="600" y1="0" x2="600" y2="700" stroke="#fff" stroke-width="1" opacity="0.05"/>
    <line x1="800" y1="0" x2="800" y2="700" stroke="#fff" stroke-width="1" opacity="0.05"/>
    <line x1="1000" y1="0" x2="1000" y2="700" stroke="#fff" stroke-width="1" opacity="0.05"/>
    
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#fff" stroke-width="1" opacity="0.05"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1" opacity="0.05"/>
    <line x1="0" y1="450" x2="1200" y2="450" stroke="#fff" stroke-width="1" opacity="0.05"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#fff" stroke-width="1" opacity="0.05"/>
  </g>
  
  <!-- Accent accent decorative shapes -->
  <circle cx="150" cy="100" r="60" fill="#F59E0B" opacity="0.08"/>
  <circle cx="1050" cy="550" r="80" fill="#16A34A" opacity="0.06"/>
  <rect x="850" y="50" width="120" height="120" fill="#16A34A" opacity="0.05"/>
</svg>